<style>

body{
background:#000;

.card{

}
h2{font-size:20px;}
button{
width:100%;
padding:14px;
margin-top:15px;
background:red;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
input{
width:100%;
max-width:100%;
padding:14px;
border-radius:10px;
margin-top:10px;
font-size:16px;
border:none;
outline:none;
}
.opcao{
padding:14px;
margin-top:10px;
background:#111;
border:1px solid #222;
border-radius:10px;
cursor:pointer;
}
.certa{background:green;}
.errada{background:darkred;}

<button id="btnVoltar" onclick="voltar()">Voltar</button>

<div id="final">
<h2>Resultado Final</h2>
<p id="res"></p>
<h3>🏆 Ranking Geral</h3>
<div id="ranking"></div>
<button onclick="reiniciar()">Reiniciar Prova</button>
<button onclick="gerarPDF()">Baixar PDF</button>
</div>

</div>

<script>

/* ================= SISTEMA ================= */

document.getElementById("final").style.display="none";
document.getElementById("quiz").style.display="none";

/* ================= QUESTÕES ================= */

const banco=[

// ================= LITERATURA =================

{

{

],

],
c:1,

},

{

],

x:"Verbo 'haver' é impessoal."
},

{

"Concorda com o sujeito",

"Refere-se ao plural"
],
c:1,
x:"Indica tempo, sendo impessoal."
},

],

},

{

c:0,

},

],

// ================= EXTRA =================

{

{

o:["Poema","Crônica","Manual","Romance"],

{

{

/* ================= QUIZ ================= */

function iniciar(){
nome=document.getElementById("nome").value;
if(!nome)return alert("Digite nome");

document.getElementById("inicio").style.display="none";
document.getElementById("quiz").style.display="block";

carregar();
}
function carregar(){
if(i>=banco.length)return fim();

let q=banco[i];

document.getElementById("progresso").innerText=
`Questão ${i+1} de ${banco.length}`;

document.getElementById("p").innerText=q.t;

let html="";
q.o.forEach((o,idx)=>{
html+=`<div class="opcao" onclick="responder(${idx})">${o}</div>`;
});

document.getElementById("op").innerHTML=html;
document.getElementById("exp").innerText="";

// 🔥 RESTAURAR RESPOSTA SE JÁ EXISTIR
let respAnterior = respostas[i];

if(respAnterior){
  respondido = true;

  let ops = document.querySelectorAll(".opcao");

  ops[respAnterior.c].classList.add("certa");

  if(respAnterior.r !== respAnterior.c){
    ops[respAnterior.r].classList.add("errada");
  }

  document.getElementById("exp").innerText = respAnterior.x;
}else{
  respondido = false;
}
}
function responder(e){
if(respondido)return;
respondido=true;

let q=banco[i];
let ops=document.querySelectorAll(".opcao");

ops[q.c].classList.add("certa");
if(e!==q.c)ops[e].classList.add("errada");
else pontos++;

respostas[i] = {q:q.t,r:e,c:q.c,x:q.x,o:q.o};
document.getElementById("exp").innerText=q.x;
}

function prox(){
respondido=false;
i++;
carregar();
}

function voltar(){
if(i<=0)return;

i--;
carregar();
}

function fim(){
document.getElementById("quiz").style.display="none";
document.getElementById("final").style.display="block";

salvarRanking();
mostrarRanking();

document.getElementById("res").innerText=
`${nome} acertou ${pontos}/${banco.length}`;
}

/* ================= 🔥 RANKING ONLINE ================= */

function salvarRanking(){
db.ref("ranking").push({
  nome: nome,
  pontos: pontos,
  data: Date.now()
});
}

function mostrarRanking(){
  db.ref("ranking").off(); // 🔥 evita múltiplos listeners

  db.ref("ranking").on("value",(snapshot)=>{

    let dados = snapshot.val() || {};
    let lista = Object.values(dados);

    lista.sort((a,b)=>b.pontos-a.pontos);

    document.getElementById("ranking").innerHTML =
      lista.map((x,i)=>`${i+1}º - ${x.nome} (${x.pontos})`).join("<br>");

  });
}
/* ================= PDF ================= */

function gerarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let y=10;
doc.text(`Aluno: ${nome}`,10,y);
y+=10;

respostas.forEach((r,i)=>{

let texto=`${i+1}) ${r.q}
Sua: ${r.o[r.r]}
Correta: ${r.o[r.c]}
Exp: ${r.x}`;

let linhas=doc.splitTextToSize(texto,180);

if(y + linhas.length*7 > 280){
doc.addPage();
y=10;
}

doc.text(linhas,10,y);
y+=linhas.length*7+5;

});

doc.save("resultado.pdf");
}
mostrarRanking();

</script>
