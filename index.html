<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTS3M4l4QJL02_5uMXI1BqD_6qP61Uq8wNTug&s" rel="icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;}
body{
background:#000;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
padding:10px;
margin:0;
}
.card{
width:100%;
max-width:950px;
background:#0b0b0b;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px red;
}
h2{font-size:20px;}
button{
width:100%;
padding:14px;
margin-top:15px;
background:red;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
input{
width:100%;
max-width:100%;
padding:14px;
border-radius:10px;
margin-top:10px;
font-size:16px;
border:none;
outline:none;
}
.opcao{
padding:14px;
margin-top:10px;
background:#111;
border:1px solid #222;
border-radius:10px;
cursor:pointer;
}
.certa{background:green;}
.errada{background:darkred;}
#quiz,#final{display:none;}
#progresso{
margin-bottom:10px;
color:#ff4d4d;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div id="inicio">
<h2>Simulada Português</h2>
<input id="nome" placeholder="Seu nome">
<button onclick="iniciar()">Iniciar Prova</button>
<button onclick="window.location.href='adm.html'">Área ADM</button>
</div>

<div id="quiz">
<div id="progresso"></div>
<h2 id="p"></h2>
<div id="op"></div>
<p id="exp"></p>
<button onclick="prox()">Próxima</button>
<button id="btnVoltar" onclick="voltar()">Voltar</button>
</div>

<div id="final">
<h2>Resultado Final</h2>
<p id="res"></p>
<h3>🏆 Ranking Geral</h3>
<div id="ranking"></div>
<button onclick="reiniciar()">Reiniciar Prova</button>
<button onclick="gerarPDF()">Baixar PDF</button>
</div>

</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "SUA_API_KEY",
  authDomain: "SEU_PROJETO.firebaseapp.com",
  databaseURL: "https://SEU_PROJETO-default-rtdb.firebaseio.com",
  projectId: "SEU_PROJETO",
  storageBucket: "SEU_PROJETO.appspot.com",
  messagingSenderId: "XXXX",
  appId: "XXXX"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= SISTEMA ================= */

let nome="",i=0,pontos=0,respostas=[],respondido=false;

function reiniciar(){
i=0;
pontos=0;
respostas=[];
respondido=false;

document.getElementById("final").style.display="none";
document.getElementById("quiz").style.display="none";
document.getElementById("inicio").style.display="block";
document.getElementById("nome").value="";
}

/* ================= QUESTÕES ================= */

const banco = [ /* 🔥 SUAS QUESTÕES CONTINUAM AQUI (não alterei nada) */ ];

/* ================= QUIZ ================= */

function iniciar(){
nome=document.getElementById("nome").value;
if(!nome)return alert("Digite nome");

document.getElementById("inicio").style.display="none";
document.getElementById("quiz").style.display="block";

carregar();
}

function carregar(){
if(i>=banco.length)return fim();

let q=banco[i];

document.getElementById("progresso").innerText=
`Questão ${i+1} de ${banco.length}`;

document.getElementById("p").innerText=q.t;

let html="";
q.o.forEach((o,idx)=>{
html+=`<div class="opcao" onclick="responder(${idx})">${o}</div>`;
});

document.getElementById("op").innerHTML=html;
document.getElementById("exp").innerText="";
}

function responder(e){
if(respondido)return;
respondido=true;

let q=banco[i];
let ops=document.querySelectorAll(".opcao");

ops[q.c].classList.add("certa");
if(e!==q.c)ops[e].classList.add("errada");
else pontos++;

respostas.push({q:q.t,r:e,c:q.c,x:q.x,o:q.o});

document.getElementById("exp").innerText=q.x;
}

function prox(){
respondido=false;
i++;
carregar();
}

function voltar(){
if(i<=0)return;
i--;
respostas.pop();
carregar();
}

function fim(){
document.getElementById("quiz").style.display="none";
document.getElementById("final").style.display="block";

salvarRanking();
mostrarRanking();

document.getElementById("res").innerText=
`${nome} acertou ${pontos}/${banco.length}`;
}

/* ================= 🔥 RANKING ONLINE ================= */

function salvarRanking(){
db.ref("ranking").push({
  nome: nome,
  pontos: pontos,
  data: Date.now()
});
}

function mostrarRanking(){
db.ref("ranking").on("value",(snapshot)=>{

let dados = snapshot.val() || {};
let lista = Object.values(dados);

lista.sort((a,b)=>b.pontos-a.pontos);

document.getElementById("ranking").innerHTML =
lista.map((x,i)=>`${i+1}º - ${x.nome} (${x.pontos})`).join("<br>");

});
}

/* ================= PDF ================= */

function gerarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let y=10;
doc.text(`Aluno: ${nome}`,10,y);
y+=10;

respostas.forEach((r,i)=>{

let texto=`${i+1}) ${r.q}
Sua: ${r.o[r.r]}
Correta: ${r.o[r.c]}
Exp: ${r.x}`;

let linhas=doc.splitTextToSize(texto,180);

if(y + linhas.length*7 > 280){
doc.addPage();
y=10;
}

doc.text(linhas,10,y);
y+=linhas.length*7+5;

});

doc.save("resultado.pdf");
}

</script>

</body>
</html>
