<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<link href="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTS3M4l4QJL02_5uMXI1BqD_6qP61Uq8wNTug&s" rel="icon">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulado</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
*{box-sizing:border-box;}
body{
background:#000;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
padding:10px;
margin:0;
}
.card{
width:100%;
max-width:950px;
background:#0b0b0b;
padding:15px;
border-radius:15px;
box-shadow:0 0 15px red;
}
h2{font-size:20px;}
button{
width:100%;
padding:14px;
margin-top:15px;
background:red;
color:#fff;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
}
input{
width:100%;
max-width:100%;
padding:14px;
border-radius:10px;
margin-top:10px;
font-size:16px;
border:none;
outline:none;
}
.opcao{
padding:14px;
margin-top:10px;
background:#111;
border:1px solid #222;
border-radius:10px;
cursor:pointer;
}
.certa{background:green;}
.errada{background:darkred;}
#quiz,#final{display:none;}
#progresso{
margin-bottom:10px;
color:#ff4d4d;
font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

<div id="inicio">
<h2>Simulada Matemática</h2>
<input id="nome" placeholder="Seu nome">
<button onclick="iniciar()">Iniciar Prova</button>
<button onclick="window.location.href='adm.html'">Área ADM</button>
</div>

<div id="quiz">
<div id="progresso"></div>
<h2 id="p"></h2>
<div id="op"></div>
<p id="exp"></p>
<button onclick="prox()">Próxima</button>
<button id="btnVoltar" onclick="voltar()">Voltar</button>
</div>

<div id="final">
<h2>Resultado Final</h2>
<p id="res"></p>
<h3>🏆 Ranking Geral</h3>
<div id="ranking"></div>
<button onclick="reiniciar()">Reiniciar Prova</button>
<button onclick="gerarPDF()">Baixar PDF</button>
</div>

</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDpyHKHjNhVGP_T-azFM8VE99mMzoQ2TKw",
  authDomain: "simulado1.firebaseapp.com",
  databaseURL: "https://simulado1-default-rtdb.firebaseio.com",
  projectId: "simulado1",
  storageBucket: "simulado1.firebasestorage.app",
  messagingSenderId: "625344929823",
  appId: "1:625344929823:web:2a64283815450a7af7b52a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ================= SISTEMA ================= */

let nome="",i=0,pontos=0,respostas=[],respondido=false;

function reiniciar(){
i=0;
pontos=0;
respostas=[];
respondido=false;

document.getElementById("final").style.display="none";
document.getElementById("quiz").style.display="none";
document.getElementById("inicio").style.display="block";
document.getElementById("nome").value="";
}

/* ================= QUESTÕES ================= */

const banco=[

// Aula 1
{
t:"Resolva a equação: 2^x = 8",
o:["x = 2","x = 3","x = 4","x = 1"],
c:3,
x:"Para resolver, transformamos 8 em potência de base 2.\n\nSabemos que 8 = 2³.\n\nEntão igualamos os expoentes: x = 3."
},

// Aula 2
{
t:"Qual é a principal característica da função exponencial?",
o:[
"Cresce ou decresce rapidamente",
"É sempre constante",
"Forma uma reta",
"Não varia"
],
c:0,
x:"A função exponencial cresce ou decresce rapidamente.\n\nIsso acontece porque o número está no expoente.\n\nPequenas variações geram grandes resultados."
},

// Aula 3
{
t:"Uma bactéria dobra a cada hora. Começando com 1 bactéria, quantas haverá após 3 horas?",
o:["6","8","4","2"],
c:1,
x:"A quantidade dobra a cada hora.\n\nApós 1h: 2\nApós 2h: 4\nApós 3h: 8\n\nLogo, o resultado é 8."
},

// Aula 5
{
t:"O gráfico da função exponencial y = 2^x é:",
o:[
"Uma reta",
"Uma curva crescente",
"Uma parábola",
"Uma linha horizontal"
],
c:1,
x:"A função exponencial forma uma curva.\n\nComo a base é maior que 1, ela cresce.\n\nPortanto, é uma curva crescente."
},

// Aula 6
{
t:"Quando a base da função exponencial está entre 0 e 1, o gráfico é:",
o:["Crescente","Decrescente","Constante","Linear"],
c:1,
x:"Se a base está entre 0 e 1, a função diminui.\n\nOu seja, o gráfico é decrescente.\n\nExemplo: y = (1/2)^x."
},

// Aula 7
{
t:"Qual o valor de 2^4?",
o:["8","16","12","10"],
c:1,
x:"Multiplicamos 2 por ele mesmo 4 vezes.\n\n2 × 2 × 2 × 2 = 16.\n\nLogo, o resultado é 16."
},

// Aula 9
{
t:"Qual é o valor de log₁₀(100)?",
o:["1","2","10","100"],
c:1,
x:"Logaritmo pergunta: 10 elevado a quanto dá 100?\n\nSabemos que 10² = 100.\n\nEntão, o resultado é 2."
},

// Aula 10
{
t:"log(a × b) é igual a:",
o:[
"log a + log b",
"log a - log b",
"log(a/b)",
"log(a²)"
],
c:0,
x:"Uma propriedade importante diz:\n\nlog(a × b) = log a + log b.\n\nOu seja, multiplicação vira soma."
},

// Aula 11
{
t:"log(a/b) é igual a:",
o:[
"log a + log b",
"log a - log b",
"log(ab)",
"log a²"
],
c:1,
x:"Outra propriedade importante:\n\nlog(a/b) = log a - log b.\n\nDivisão vira subtração."
},

// Aula 13
{
t:"Resolva: log₁₀(x) = 2",
o:["10","100","2","20"],
c:1,
x:"Transformamos em forma exponencial.\n\n10² = x.\n\nLogo, x = 100."
},

// Aula 14
{
t:"Resolva: log₂(x) = 3",
o:["6","8","9","4"],
c:1,
x:"Forma exponencial:\n\n2³ = x.\n\nLogo, x = 8."
},

// Aula 15
{
t:"Para que servem os logaritmos?",
o:[
"Somar números",
"Resolver exponenciais",
"Dividir números",
"Subtrair valores"
],
c:1,
x:"Os logaritmos ajudam a resolver equações exponenciais.\n\nEles transformam potência em multiplicação.\n\nFacilitando cálculos complexos."
},

// Aula 16
{
t:"Qual o valor de log₁₀(1000)?",
o:["2","3","10","1"],
c:1,
x:"Pergunta: 10 elevado a quanto dá 1000?\n\nSabemos que 10³ = 1000.\n\nEntão o resultado é 3."
},

// Aula 17
{
t:"Resolva: 2^x = 32",
o:["3","4","5","6"],
c:2,
x:"Transformamos 32 em potência de 2.\n\n32 = 2⁵.\n\nLogo, x = 5."
},

// Aula 18
{
t:"A função logarítmica é o inverso de qual função?",
o:[
"Linear",
"Quadrática",
"Exponencial",
"Constante"
],
c:2,
x:"A função logarítmica desfaz a exponencial.\n\nOu seja, elas são inversas.\n\nUma desfaz o efeito da outra."
},

// Aula 21
{
t:"O gráfico da função logarítmica é:",
o:[
"Reta",
"Curva crescente",
"Parábola",
"Linha horizontal"
],
c:1,
x:"A função logarítmica forma uma curva.\n\nSe a base for maior que 1, ela cresce.\n\nLogo, é crescente."
},

// Aula 22
{
t:"A função logarítmica não existe para valores de x:",
o:["Negativos","Positivos","Maiores que 1","Iguais a 10"],
c:0,
x:"Logaritmo não aceita números negativos.\n\nO domínio é apenas x > 0.\n\nPor isso negativos não funcionam."
},

// Aula 23
{
t:"Qual o valor de log₂(16)?",
o:["2","3","4","5"],
c:2,
x:"Pergunta: 2 elevado a quanto dá 16?\n\n2⁴ = 16.\n\nLogo, o resultado é 4."
},

// Aula 25
{
t:"Qual o valor de 3^2?",
o:["6","9","3","12"],
c:1,
x:"Multiplicamos 3 por ele mesmo.\n\n3 × 3 = 9.\n\nResultado: 9."
},

// Aula 26
{
t:"log₁₀(10) é:",
o:["0","1","10","100"],
c:1,
x:"10¹ = 10.\n\nEntão log₁₀(10) = 1.\n\nSempre que base = número, resultado é 1."
},

// Aula 27
{
t:"A função logarítmica cresce quando:",
o:[
"Base > 1",
"Base < 1",
"Base = 0",
"Base negativa"
],
c:0,
x:"Se a base for maior que 1, a função cresce.\n\nSe for entre 0 e 1, ela decresce.\n\nIsso define o comportamento do gráfico."
}

];

/* ================= QUIZ ================= */

function iniciar(){
nome=document.getElementById("nome").value;
if(!nome)return alert("Digite nome");

document.getElementById("inicio").style.display="none";
document.getElementById("quiz").style.display="block";

carregar();
}
function carregar(){
if(i>=banco.length)return fim();

let q=banco[i];

document.getElementById("progresso").innerText=
`Questão ${i+1} de ${banco.length}`;

document.getElementById("p").innerText=q.t;

let html="";
q.o.forEach((o,idx)=>{
html+=`<div class="opcao" onclick="responder(${idx})">${o}</div>`;
});

document.getElementById("op").innerHTML=html;
document.getElementById("exp").innerText="";

// 🔥 RESTAURAR RESPOSTA SE JÁ EXISTIR
let respAnterior = respostas[i];

if(respAnterior){
  respondido = true;

  let ops = document.querySelectorAll(".opcao");

  ops[respAnterior.c].classList.add("certa");

  if(respAnterior.r !== respAnterior.c){
    ops[respAnterior.r].classList.add("errada");
  }

  document.getElementById("exp").innerText = respAnterior.x;
}else{
  respondido = false;
}
}
function responder(e){
if(respondido)return;
respondido=true;

let q=banco[i];
let ops=document.querySelectorAll(".opcao");

ops[q.c].classList.add("certa");
if(e!==q.c)ops[e].classList.add("errada");
else pontos++;

respostas[i] = {q:q.t,r:e,c:q.c,x:q.x,o:q.o};
document.getElementById("exp").innerText=q.x;
}

function prox(){
respondido=false;
i++;
carregar();
}

function voltar(){
if(i<=0)return;

i--;
carregar();
}

function fim(){
document.getElementById("quiz").style.display="none";
document.getElementById("final").style.display="block";

salvarRanking();
mostrarRanking();

document.getElementById("res").innerText=
`${nome} acertou ${pontos}/${banco.length}`;
}

/* ================= 🔥 RANKING ONLINE ================= */

function salvarRanking(){
db.ref("ranking").push({
  nome: nome,
  pontos: pontos,
  data: Date.now()
});
}

function mostrarRanking(){
  db.ref("ranking").off(); 

  db.ref("ranking").on("value",(snapshot)=>{

    let dados = snapshot.val() || {};
    let lista = Object.values(dados);

    lista.sort((a,b)=>b.pontos-a.pontos);

    document.getElementById("ranking").innerHTML =
      lista.map((x,i)=>`${i+1}º - ${x.nome} (${x.pontos})`).join("<br>");

  });
}
/* ================= PDF ================= */

function gerarPDF(){
const {jsPDF}=window.jspdf;
let doc=new jsPDF();

let y=10;
doc.text(`Aluno: ${nome}`,10,y);
y+=10;

respostas.forEach((r,i)=>{

let texto=`${i+1}) ${r.q}
Sua: ${r.o[r.r]}
Correta: ${r.o[r.c]}
Exp: ${r.x}`;

let linhas=doc.splitTextToSize(texto,180);

if(y + linhas.length*7 > 280){
doc.addPage();
y=10;
}

doc.text(linhas,10,y);
y+=linhas.length*7+5;

});

doc.save("resultado.pdf");
}
mostrarRanking();

</script>

</body>
</html>
