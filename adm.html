<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área ADM</title>

<!-- 🔥 FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<style>
body{
background:#000;
color:#fff;
font-family:Arial;
display:flex;
justify-content:center;
padding:10px;
margin:0;
}

.card{
width:100%;
max-width:600px;
background:#0b0b0b;
padding:20px;
border-radius:15px;
box-shadow:0 0 15px red;
}

button{
width:100%;
padding:14px;
margin-top:10px;
background:red;
color:#fff;
border:none;
border-radius:10px;
cursor:pointer;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:none;
}
</style>
</head>

<body>

<div class="card">

<h2>Área Administrativa</h2>

<input id="senha" placeholder="Senha">

<!-- 🔥 BOTÃO COM ID -->
<button id="btnEntrar">Entrar</button>

<div id="painel" style="display:none">
<h3>Ranking</h3>
<div id="rank"></div>

<button onclick="limpar()">Limpar Ranking</button>
<button onclick="voltar()">Voltar</button>
</div>

</div>

<script>

/* 🔥 CONFIG FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyDpyHKHjNhVGP_T-azFM8VE99mMzoQ2TKw",
  authDomain: "simulado1.firebaseapp.com",
  databaseURL: "https://simulado1-default-rtdb.firebaseio.com",
  projectId: "simulado1",
  storageBucket: "simulado1.firebasestorage.app",
  messagingSenderId: "625344929823",
  appId: "1:625344929823:web:2a64283815450a7af7b52a"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* 🔥 EVENTO DO BOTÃO (mais seguro que onclick) */
document.getElementById("btnEntrar").addEventListener("click", login);

/* 🔥 LOGIN */
function login(){
  let s = document.getElementById("senha").value;

  if(s !== "2821"){
    alert("Senha errada");
    return;
  }

  // mostra painel
  document.getElementById("painel").style.display = "block";

  // 🔥 ESCONDE BOTÃO
  document.getElementById("btnEntrar").style.display = "none";

  // 🔥 OPCIONAL: esconder campo senha também
  document.getElementById("senha").style.display = "none";

  mostrar();
}

/* 🔥 RANKING AO VIVO */
function mostrar(){
  db.ref("ranking").off(); // evita bug

  db.ref("ranking").on("value",(snapshot)=>{

    let dados = snapshot.val() || {};
    let lista = Object.values(dados);

    lista.sort((a,b)=>b.pontos-a.pontos);

    document.getElementById("rank").innerHTML =
      lista.map((x,i)=>`${i+1}º ${x.nome} - ${x.pontos}`).join("<br>");

  });
}

/* 🔥 LIMPAR RANKING */
function limpar(){
  db.ref("ranking").remove();
}

/* 🔥 VOLTAR */
function voltar(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
